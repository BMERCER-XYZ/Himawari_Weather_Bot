name: Post Himawari Satellite Image

on:
  workflow_dispatch:  # Manual trigger from GitHub Actions UI
  schedule:
    - cron: '0 */1 * * *'  # Run every 1 hour automatically

jobs:
  post-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests Pillow matplotlib

      - name: Post Himawari image to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python post_himawari.py

      - name: Commit and push forecast cache
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add hourly_forecast_cache.json || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update hourly forecast cache" && git push)